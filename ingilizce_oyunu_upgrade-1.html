
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelime Oyunu</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0;padding:20px;}
#startScreen,#gameScreen{display:none;}
#options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:20px auto;}
button{padding:12px;font-size:18px;border:none;border-radius:12px;cursor:pointer;}
.correct{background:#2ecc71 !important;box-shadow:0 0 18px #2ecc71;}
.wrong{background:#e74c3c !important;animation:shake .3s;}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}}
</style>
</head>
<body>

<div id="startScreen">
<h2>Süre Seç</h2>
<button onclick="startGame(30)">30</button>
<button onclick="startGame(60)">60</button>
<button onclick="startGame(90)">90</button>
</div>

<div id="gameScreen">
<div style="display:flex;justify-content:space-between;">
<div id="timer"></div>
<div>
<div id="score"></div>
<div id="highscore" style="font-size:14px;"></div>
</div>
</div>

<h1 id="word"></h1>
<div id="options"></div>
</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0a6d.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b6baf3e7c.mp3"></audio>

<script>

const words=[{q:"teacher",a:"öğretmen",w:["öğrenci","kitap","defter"]},{q:"student",a:"öğrenci",w:["kitap","defter","kalem"]},{q:"book",a:"kitap",w:["defter","kalem","kurşun kalem"]},{q:"notebook",a:"defter",w:["kalem","kurşun kalem","silgi"]},{q:"pen",a:"kalem",w:["kurşun kalem","silgi","tahta"]},{q:"pencil",a:"kurşun kalem",w:["silgi","tahta","sıra"]},{q:"eraser",a:"silgi",w:["tahta","sıra","okul"]},{q:"board",a:"tahta",w:["sıra","okul","sınıf"]},{q:"desk",a:"sıra",w:["okul","sınıf","ders"]},{q:"school",a:"okul",w:["sınıf","ders","ödev"]},{q:"classroom",a:"sınıf",w:["ders","ödev","sınav"]},{q:"lesson",a:"ders",w:["ödev","sınav","teneffüs"]},{q:"homework",a:"ödev",w:["sınav","teneffüs","arkadaş"]},{q:"exam",a:"sınav",w:["teneffüs","arkadaş","müdür"]},{q:"break",a:"teneffüs",w:["arkadaş","müdür","kütüphane"]},{q:"friend",a:"arkadaş",w:["müdür","kütüphane","kurs"]},{q:"principal",a:"müdür",w:["kütüphane","kurs","ders konusu"]},{q:"library",a:"kütüphane",w:["kurs","ders konusu","aile"]},{q:"course",a:"kurs",w:["ders konusu","aile","anne"]},{q:"subject",a:"ders konusu",w:["aile","anne","baba"]},{q:"family",a:"aile",w:["anne","baba","kız kardeş"]},{q:"mother",a:"anne",w:["baba","kız kardeş","erkek kardeş"]},{q:"father",a:"baba",w:["kız kardeş","erkek kardeş","büyükanne"]},{q:"sister",a:"kız kardeş",w:["erkek kardeş","büyükanne","büyükbaba"]},{q:"brother",a:"erkek kardeş",w:["büyükanne","büyükbaba","amca"]},{q:"grandmother",a:"büyükanne",w:["büyükbaba","amca","teyze"]},{q:"grandfather",a:"büyükbaba",w:["amca","teyze","kuzen"]},{q:"uncle",a:"amca",w:["teyze","kuzen","bebek"]},{q:"aunt",a:"teyze",w:["kuzen","bebek","ebeveyn"]},{q:"cousin",a:"kuzen",w:["bebek","ebeveyn","çocuk"]},{q:"baby",a:"bebek",w:["ebeveyn","çocuk","oğul"]},{q:"parent",a:"ebeveyn",w:["çocuk","oğul","kız evlat"]},{q:"child",a:"çocuk",w:["oğul","kız evlat","uzun"]},{q:"son",a:"oğul",w:["kız evlat","uzun","kısa"]},{q:"daughter",a:"kız evlat",w:["uzun","kısa","şişman"]},{q:"tall",a:"uzun",w:["kısa","şişman","zayıf"]},{q:"short",a:"kısa",w:["şişman","zayıf","genç"]},{q:"fat",a:"şişman",w:["zayıf","genç","yaşlı"]},{q:"thin",a:"zayıf",w:["genç","yaşlı","güzel"]},{q:"young",a:"genç",w:["yaşlı","güzel","yakışıklı"]},{q:"old",a:"yaşlı",w:["güzel","yakışıklı","çirkin"]},{q:"beautiful",a:"güzel",w:["yakışıklı","çirkin","güçlü"]},{q:"handsome",a:"yakışıklı",w:["çirkin","güçlü","zayıf güçsüz"]},{q:"ugly",a:"çirkin",w:["güçlü","zayıf güçsüz","mutlu"]},{q:"strong",a:"güçlü",w:["zayıf güçsüz","mutlu","üzgün"]},{q:"weak",a:"zayıf güçsüz",w:["mutlu","üzgün","kızgın"]},{q:"happy",a:"mutlu",w:["üzgün","kızgın","sakin"]},{q:"sad",a:"üzgün",w:["kızgın","sakin","nazik"]},{q:"angry",a:"kızgın",w:["sakin","nazik","kaba"]},{q:"calm",a:"sakin",w:["nazik","kaba","komik"]},{q:"kind",a:"nazik",w:["kaba","komik","ciddi"]},{q:"rude",a:"kaba",w:["komik","ciddi","arkadaş canlısı"]},{q:"funny",a:"komik",w:["ciddi","arkadaş canlısı","tembel"]},{q:"serious",a:"ciddi",w:["arkadaş canlısı","tembel","çalışkan"]},{q:"friendly",a:"arkadaş canlısı",w:["tembel","çalışkan","dürüst"]},{q:"lazy",a:"tembel",w:["çalışkan","dürüst","zeki"]},{q:"hardworking",a:"çalışkan",w:["dürüst","zeki","akıllı"]},{q:"honest",a:"dürüst",w:["zeki","akıllı","uyanmak"]},{q:"smart",a:"zeki",w:["akıllı","uyanmak","uyumak"]},{q:"clever",a:"akıllı",w:["uyanmak","uyumak","yemek"]},{q:"wake",a:"uyanmak",w:["uyumak","yemek","içmek"]},{q:"sleep",a:"uyumak",w:["yemek","içmek","gitmek"]},{q:"eat",a:"yemek",w:["içmek","gitmek","gelmek"]},{q:"drink",a:"içmek",w:["gitmek","gelmek","koşmak"]},{q:"go",a:"gitmek",w:["gelmek","koşmak","yürümek"]},{q:"come",a:"gelmek",w:["koşmak","yürümek","okumak"]},{q:"run",a:"koşmak",w:["yürümek","okumak","yazmak"]},{q:"walk",a:"yürümek",w:["okumak","yazmak","dinlemek"]},{q:"read",a:"okumak",w:["yazmak","dinlemek","konuşmak"]},{q:"write",a:"yazmak",w:["dinlemek","konuşmak","izlemek"]},{q:"listen",a:"dinlemek",w:["konuşmak","izlemek","oynamak"]},{q:"speak",a:"konuşmak",w:["izlemek","oynamak","çalışmak"]},{q:"watch",a:"izlemek",w:["oynamak","çalışmak","yaşamak"]},{q:"play",a:"oynamak",w:["çalışmak","yaşamak","sevmek"]},{q:"study",a:"çalışmak",w:["yaşamak","sevmek","beğenmek"]},{q:"live",a:"yaşamak",w:["sevmek","beğenmek","istemek"]},{q:"love",a:"sevmek",w:["beğenmek","istemek","ihtiyaç duymak"]},{q:"like",a:"beğenmek",w:["istemek","ihtiyaç duymak","açmak"]},{q:"want",a:"istemek",w:["ihtiyaç duymak","açmak","kapatmak"]},{q:"need",a:"ihtiyaç duymak",w:["açmak","kapatmak","başlamak"]},{q:"open",a:"açmak",w:["kapatmak","başlamak","bitirmek"]},{q:"close",a:"kapatmak",w:["başlamak","bitirmek","yardım etmek"]},{q:"start",a:"başlamak",w:["bitirmek","yardım etmek","temizlemek"]},{q:"finish",a:"bitirmek",w:["yardım etmek","temizlemek","yemek pişirmek"]},{q:"help",a:"yardım etmek",w:["temizlemek","yemek pişirmek","yıkamak"]},{q:"clean",a:"temizlemek",w:["yemek pişirmek","yıkamak","satın almak"]},{q:"cook",a:"yemek pişirmek",w:["yıkamak","satın almak","satmak"]},{q:"wash",a:"yıkamak",w:["satın almak","satmak","sabah"]},{q:"buy",a:"satın almak",w:["satmak","sabah","öğleden sonra"]},{q:"sell",a:"satmak",w:["sabah","öğleden sonra","akşam"]},{q:"morning",a:"sabah",w:["öğleden sonra","akşam","gece"]},{q:"afternoon",a:"öğleden sonra",w:["akşam","gece","bugün"]},{q:"evening",a:"akşam",w:["gece","bugün","yarın"]},{q:"night",a:"gece",w:["bugün","yarın","dün"]},{q:"today",a:"bugün",w:["yarın","dün","her zaman"]},{q:"tomorrow",a:"yarın",w:["dün","her zaman","sık sık"]},{q:"yesterday",a:"dün",w:["her zaman","sık sık","bazen"]},{q:"always",a:"her zaman",w:["sık sık","bazen","asla"]},{q:"often",a:"sık sık",w:["bazen","asla","burada"]},{q:"sometimes",a:"bazen",w:["asla","burada","orada"]},{q:"never",a:"asla",w:["burada","orada","içeride"]},{q:"here",a:"burada",w:["orada","içeride","dışarıda"]},{q:"there",a:"orada",w:["içeride","dışarıda","büyük"]},{q:"inside",a:"içeride",w:["dışarıda","büyük","küçük"]},{q:"outside",a:"dışarıda",w:["büyük","küçük","yeni"]},{q:"big",a:"büyük",w:["küçük","yeni","eski"]},{q:"small",a:"küçük",w:["yeni","eski","hızlı"]},{q:"new",a:"yeni",w:["eski","hızlı","yavaş"]},{q:"old_item",a:"eski",w:["hızlı","yavaş","sıcak"]},{q:"fast",a:"hızlı",w:["yavaş","sıcak","soğuk"]},{q:"slow",a:"yavaş",w:["sıcak","soğuk","kolay"]},{q:"hot",a:"sıcak",w:["soğuk","kolay","zor"]},{q:"cold",a:"soğuk",w:["kolay","zor","öğretmen"]},{q:"easy",a:"kolay",w:["zor","öğretmen","öğrenci"]},{q:"difficult",a:"zor",w:["öğretmen","öğrenci","kitap"]}];

let score=0,time=60,highScore=localStorage.getItem("highScore")||0,timerInterval;
document.getElementById("startScreen").style.display="block";

function startGame(t){time=t;score=0;
startScreen.style.display="none";gameScreen.style.display="block";
updateUI();newQuestion();
timerInterval=setInterval(()=>{time--;updateUI();if(time<=0){clearInterval(timerInterval);alert("Süre bitti! Skorun: "+score);location.reload();}},1000);
}

function updateUI(){timer.innerText="Süre: "+time;scoreEl=score;score.innerText="Skor: "+score;highscore.innerText="En yüksek: "+highScore;}

function newQuestion(){
const q=words[Math.floor(Math.random()*words.length)];
word.innerText=q.q;
const opts=[...q.w,q.a].sort(()=>Math.random()-0.5);
options.innerHTML="";
opts.forEach(o=>{
const b=document.createElement("button");b.innerText=o;
b.onclick=()=>{
if(o===q.a){b.classList.add("correct");correctSound.play();score+=10;}
else{b.classList.add("wrong");wrongSound.play();score=Math.max(0,score-1);}
if(score>highScore){highScore=score;localStorage.setItem("highScore",highScore);}
updateUI();setTimeout(newQuestion,600);
};
options.appendChild(b);
});
}


// ===== UPGRADE SYSTEM =====
let lives=3,combo=0,maxCombo=0,correctCount=0,wrongCount=0;

function startGame(t){
time=t;score=0;lives=3;combo=0;maxCombo=0;correctCount=0;wrongCount=0;
startScreen.style.display="none";
gameScreen.style.display="block";
updateUI();
newQuestion();
timerInterval=setInterval(()=>{
time--;
updateUI();
if(time<=0 || lives<=0){
endGame();
}
},1000);
}

function endGame(){
clearInterval(timerInterval);
let accuracy = correctCount+wrongCount>0 ? 
Math.round((correctCount/(correctCount+wrongCount))*100) : 0;

alert(
"⏳ Oyun Bitti!\n\n"+
"Skor: "+score+
"\nDoğru: "+correctCount+
"\nYanlış: "+wrongCount+
"\nMax Combo: "+maxCombo+
"\nDoğruluk: %"+accuracy
);
location.reload();
}

function updateUI(){
timer.innerText="Süre: "+time+" | ❤️ "+lives+" | 🔥 "+combo;
score.innerText="Skor: "+score;

let level="Level 1";
if(score>=30 && score<70) level="Level 2";
if(score>=70) level="Level 3";

highscore.innerText="En yüksek: "+highScore+" | "+level;
}

const originalNewQuestion = newQuestion;
newQuestion = function(){
const q=words[Math.floor(Math.random()*words.length)];
word.innerText=q.q;
const opts=[...q.w,q.a].sort(()=>Math.random()-0.5);
options.innerHTML="";
opts.forEach(o=>{
const b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{
if(o===q.a){
b.classList.add("correct");
correctSound.play();
score+=10;
correctCount++;
combo++;
if(combo===3) score+=2;
if(combo===5) score+=3;
if(combo>maxCombo) maxCombo=combo;
}else{
b.classList.add("wrong");
wrongSound.play();
score=Math.max(0,score-1);
wrongCount++;
lives--;
combo=0;
}
if(score>highScore){
highScore=score;
localStorage.setItem("highScore",highScore);
}
updateUI();
setTimeout(()=>{
if(lives<=0) endGame();
else originalNewQuestion();
},600);
};
options.appendChild(b);
});
}

</script>
</body>
</html>
